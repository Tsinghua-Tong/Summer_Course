<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通用人工智能系统平台I · Course Resources</title>
<style>
  :root{
    --ink:#1f2937;
    --muted:#6b7280;
    --line:#dde3ea;
    --soft:#f6f8fb;
    --accent:#1d4ed8;
    --accent-soft:#e8f0ff;
    --bg:#f3f6fb;
    --card:#ffffff;
    --max:1080px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:
      radial-gradient(circle at top left, rgba(29,78,216,.10), transparent 34%),
      radial-gradient(circle at top right, rgba(14,165,233,.09), transparent 28%),
      var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",
      "PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.72;}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  header{border-bottom:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(14px)}
  .header-inner{max-width:var(--max);margin:0 auto;padding:18px 20px 16px}
  h1{margin:0 0 8px;font-size:1.9rem;font-weight:720;letter-spacing:-.01em}
  .subtitle{margin:0;color:var(--muted);font-size:1rem}

  nav.tabs{position:sticky;top:0;z-index:10;background:rgba(243,246,251,.88);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .tabs-inner{max-width:var(--max);margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:10px 20px}
  .tab{appearance:none;border:1px solid var(--line);border-radius:999px;background:#fff;
    color:var(--muted);cursor:pointer;font:inherit;font-size:.94rem;font-weight:650;
    padding:9px 14px;white-space:nowrap;box-shadow:0 1px 1px rgba(16,24,40,.03)}
  .tab:hover{color:var(--ink);border-color:#c7d2e5;background:var(--soft)}
  .tab.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

  main{max-width:var(--max);margin:0 auto;padding:28px 20px 60px}
  .panel{display:none}
  .panel.active{display:block;background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 18px 50px rgba(17,24,39,.08);padding:26px 26px 20px}
  .panel.has-toc.active{display:grid;grid-template-columns:230px minmax(0,1fr);gap:26px}
  .md{max-width:920px}
  .md h1{font-size:1.65rem;margin:0 0 .75em;padding-bottom:.35em;border-bottom:1px solid var(--line)}
  .md h2{font-size:1.28rem;margin:1.8em 0 .55em;padding-top:.15em}
  .md h3{font-size:1.05rem;margin:1.25em 0 .35em}
  .md h4{font-size:.98rem;margin:1em 0 .3em}
  .md h2,.md h3,.md h4{scroll-margin-top:74px}
  .md p{margin:.72em 0}
  .md blockquote{margin:1em 0;padding:.2em 1em;border-left:4px solid var(--accent);background:#f8fbff;color:var(--muted);border-radius:0 12px 12px 0}
  .md blockquote p{margin:.3em 0}
  .md code{background:var(--soft);border:1px solid #eceff1;padding:.08em .32em;border-radius:4px;
    font-size:.9em;font-family:"SF Mono",Menlo,Consolas,monospace}
  .md pre{background:#f6f8fa;border:1px solid var(--line);padding:14px 16px;border-radius:12px;overflow:auto}
  .md pre code{background:transparent;border:0;padding:0}
  .md table{border-collapse:separate;border-spacing:0;width:100%;margin:1em 0;font-size:.93rem;overflow:hidden;border:1px solid var(--line);border-radius:14px}
  .md th,.md td{border-bottom:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}
  .md th{background:var(--soft);font-weight:700}
  .md tr:last-child td{border-bottom:0}
  .md ul,.md ol{padding-left:1.35em}
  .md li{margin:.28em 0}
  .md hr{border:0;border-top:1px solid var(--line);margin:2em 0}

  .toc{display:none}
  .panel.has-toc .toc{display:block;position:sticky;top:62px;align-self:start;max-height:calc(100vh - 84px);overflow:auto;
    border-right:1px solid var(--line);padding:4px 14px 4px 0;color:var(--muted)}
  .toc-title{margin:0 0 10px;font-size:.78rem;font-weight:750;color:var(--ink);letter-spacing:.02em;text-transform:uppercase}
  .toc-list{list-style:none;margin:0;padding:0}
  .toc-list li{margin:0}
  .toc-list a{display:block;border-radius:8px;padding:5px 8px;color:var(--muted);font-size:.86rem;line-height:1.35}
  .toc-list a:hover{background:var(--soft);color:var(--accent);text-decoration:none}
  .toc-list .toc-level-2 a{font-weight:750;color:var(--ink)}
  .toc-list .toc-level-3 a{padding-left:18px;font-size:.82rem}
  .toc-list .toc-level-4 a{padding-left:30px;font-size:.8rem}
  .toc.homework-toc{padding-right:12px}
  .toc.homework-toc .toc-list a{display:grid;grid-template-columns:64px minmax(0,1fr);column-gap:10px;align-items:start;
    padding:7px 8px;font-weight:650;color:var(--ink)}
  .toc-kicker{white-space:nowrap;color:var(--accent);font-weight:760}
  .toc-text{min-width:0}

  footer{max-width:var(--max);margin:0 auto;padding:18px 20px 36px;color:var(--muted);font-size:.86rem}
  footer strong{color:var(--ink)}

  @media(max-width:640px){
    .header-inner{padding:20px 16px 16px}
    h1{font-size:1.45rem}
    main{padding:20px 16px 42px}
    .tabs-inner{padding:0 12px}
    .tab{padding:8px 12px}
    .panel.active{padding:20px 18px 12px;border-radius:16px}
    .panel.has-toc.active{display:block}
    .panel.has-toc .toc{position:static;max-height:none;overflow:visible;border-right:0;border-bottom:1px solid var(--line);
      padding:0 0 14px;margin-bottom:18px}
  }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>通用人工智能系统平台 I</h1>
      <p class="subtitle">General Artificial Intelligence Systems Platform I · Course Resources</p>
    </div>
  </header>

  <nav class="tabs"><div class="tabs-inner" id="tabbar"></div></nav>
  <main id="panels"></main>

  <footer>
    <strong>通用人工智能系统平台 I</strong>
    <span id="buildstamp"></span>
  </footer>

  <script src="assets/marked.min.js"></script>
  <script>
    const DOCS = __DOCS__;
    const BUILD_TIME = "__BUILD_TIME__";

    marked.setOptions({ gfm:true, breaks:false, headerIds:true, mangle:false });

    const tabbar = document.getElementById('tabbar');
    const panels = document.getElementById('panels');

    DOCS.forEach((doc, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i===0 ? ' active' : '');
      btn.textContent = doc.label;
      btn.dataset.target = doc.id;
      btn.onclick = () => select(doc.id);
      tabbar.appendChild(btn);

      const panel = document.createElement('section');
      panel.className = 'panel' + (i===0 ? ' active' : '');
      panel.id = doc.id;
      panel.innerHTML = '<aside class="toc" aria-label="Table of contents"></aside><div class="md">' + marked.parse(doc.md) + '</div>';
      panels.appendChild(panel);
      buildToc(panel, doc.id);
    });

    function slugify(text){
      return text.trim().toLowerCase()
        .replace(/<[^>]*>/g, '')
        .replace(/&amp;/g, 'and')
        .replace(/[^\p{L}\p{N}]+/gu, '-')
        .replace(/^-+|-+$/g, '') || 'section';
    }

    function buildToc(panel, docId){
      const toc = panel.querySelector('.toc');
      const md = panel.querySelector('.md');
      const selector = docId === 'learning-list' ? 'h2' : (docId === 'paper-reading-list' ? 'h2,h3,h4' : '');
      if (!selector) return;

      const headings = Array.from(md.querySelectorAll(selector));
      if (!headings.length) return;

      const seen = new Map();
      const list = document.createElement('ul');
      list.className = 'toc-list';
      headings.forEach(h => {
        const base = h.id || slugify(h.textContent);
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        h.id = count ? `${base}-${count + 1}` : base;

        const li = document.createElement('li');
        li.className = 'toc-level-' + h.tagName.slice(1);
        const a = document.createElement('a');
        a.href = '#' + h.id;
        if (docId === 'learning-list') {
          const parts = splitHomeworkTitle(h.textContent);
          const kicker = document.createElement('span');
          kicker.className = 'toc-kicker';
          kicker.textContent = parts.kicker;
          const label = document.createElement('span');
          label.className = 'toc-text';
          label.textContent = parts.text;
          a.append(kicker, label);
        } else {
          a.textContent = h.textContent;
        }
        li.appendChild(a);
        list.appendChild(li);
      });

      const title = document.createElement('p');
      title.className = 'toc-title';
      title.textContent = docId === 'learning-list' ? '快捷索引' : '目录';
      toc.appendChild(title);
      toc.appendChild(list);
      if (docId === 'learning-list') toc.classList.add('homework-toc');
      panel.classList.add('has-toc');
    }

    function splitHomeworkTitle(text){
      const cleaned = text.replace(/\s+/g, ' ').trim();
      const dayMatch = cleaned.match(/^(Day\s+\d+[–-]\d+)\s*·\s*(.+)$/);
      if (dayMatch) return {kicker: dayMatch[1], text: stripDateSuffix(dayMatch[2])};
      const finalMatch = cleaned.match(/^(Final Assignment)\s*·\s*(.+)$/);
      if (finalMatch) return {kicker: 'Final', text: stripDateSuffix(finalMatch[2])};
      return {kicker: '', text: cleaned};
    }

    function stripDateSuffix(text){
      return text.replace(/\s*\([^)]*\)\s*$/, '').trim();
    }

    function select(id){
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.target===id));
      document.querySelectorAll('.panel').forEach(p =>
        p.classList.toggle('active', p.id===id));
      window.scrollTo({top:0, behavior:'smooth'});
      if (history.replaceState) history.replaceState(null,'','#'+id);
    }

    if (location.hash){
      const id = location.hash.slice(1);
      if (DOCS.some(d => d.id===id)) select(id);
    }
    document.getElementById('buildstamp').textContent =
      BUILD_TIME ? 'Last updated: ' + BUILD_TIME : '';
  </script>
</body>
</html>
